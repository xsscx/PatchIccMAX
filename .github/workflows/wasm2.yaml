name: "WASM2"

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build and Test Linux Master Branch
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Git anonymous identity
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"

    - name: Set up Emscripten SDK and Run WASM Build Script
      run: |
        git clone https://github.com/emscripten-core/emsdk.git
        cd emsdk
        ./emsdk install latest
        ./emsdk activate latest
        source ./emsdk_env.sh
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/InternationalColorConsortium/DemoIccMAX/refs/heads/wasm/wasm_remote_build.sh)" &> wasm_smoke_test.log

    - name: Upload WASM Build Logs
      uses: actions/upload-artifact@v4
      with:
        name: wasm-smoke-test-log
        path: wasm_smoke_test.log

    - name: Gather system information
      run: |
        uname -a
        cat /etc/os-release
        gcc -v
        lscpu
        free -m
        df -h

    - name: Verify Build Success
      run: |
        if [ -f DemoIccMAX/Build/CMakeCache.txt ]; then
          echo "✅ Build configuration successful."
        else
          echo "❌ Build configuration failed."
          exit 1
        fi

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: master-build-linux
        path: DemoIccMAX/Build/CMakeCache.txt
