name: Win57-cache

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 🔹 [INIT] Checkout Repository
        uses: actions/checkout@v4

      - name: 🔹 [INIT] Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: 🔹 [CACHE] Restore vcpkg Cache
        uses: actions/cache@v3
        with:
          path: C:\test\vcpkg
          key: Win53-${{ runner.os }}-${{ hashFiles('**/vcpkg.json', '**/bootstrap-vcpkg.bat') }}
          restore-keys: |
            Win53-${{ runner.os }}-

      - name: 🔹 [SETUP] Environment & Build Preparation
        shell: pwsh
        run: |
          Write-Host "============================= Starting DemoIccMAX Master Branch Build =============================" -ForegroundColor Green
          Write-Host "© 2024-2025 David H Hoyt LLC. All rights reserved." -ForegroundColor Green

          # Set environment variables
          $env:VSCMD_ARG_HOST_ARCH = "x64"
          $env:VSCMD_ARG_TGT_ARCH = "x64"
          $optDir = "C:\test"
          $vcpkgDir = "$optDir\vcpkg"
          $patchDir = "$optDir\DemoIccMAX"

          # Setup git config
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

          # Ensure base directories exist
          if (-Not (Test-Path $optDir)) { New-Item -ItemType Directory -Path $optDir }

          # Validate vcpkg exists, else clone & bootstrap
          if (-Not (Test-Path "$vcpkgDir\vcpkg.exe")) {
              Write-Host "🔹 vcpkg not found. Cloning and bootstrapping..."
              cd $optDir
              Remove-Item -Recurse -Force $vcpkgDir -ErrorAction Ignore
              git clone https://github.com/microsoft/vcpkg.git
              cd $vcpkgDir
              Write-Host "🔹 Bootstrapping vcpkg..."
              .\bootstrap-vcpkg.bat
          }

          # Ensure vcpkg is ready
          if (-Not (Test-Path "$vcpkgDir\vcpkg.exe")) {
              Write-Host "❌ ERROR: vcpkg.exe missing even after bootstrap!" -ForegroundColor Red
              exit 1
          }

          # Integrate vcpkg and install dependencies
          Write-Host "🔹 Installing dependencies via vcpkg..."
          cd $vcpkgDir
          .\vcpkg.exe integrate install
          .\vcpkg.exe install nlohmann-json:x64-windows nlohmann-json:x64-windows-static libxml2:x64-windows tiff:x64-windows wxwidgets:x64-windows libxml2:x64-windows-static tiff:x64-windows-static wxwidgets:x64-windows-static

      - name: 🔹 [FETCH] Clone DemoIccMAX Repository
        shell: pwsh
        run: |
          $patchDir = "C:\test\DemoIccMAX"
          Write-Host "🔹 Cloning DemoIccMAX repository..."
          cd C:\test
          if (Test-Path $patchDir) {
              Remove-Item -Recurse -Force $patchDir -ErrorAction Ignore
          }
          git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git
          cd $patchDir
          git checkout msvc
          pwd
          dir

      - name: 🔹 [FIX] Adjust Library Paths
        shell: pwsh
        run: |
          $vcpkgDir = "C:\test\vcpkg"
          Write-Host "🔹 Fixing library paths..."
          copy "$vcpkgDir\installed\x64-windows\lib\tiff.lib" "$vcpkgDir\installed\x64-windows\lib\libtiff.lib"
          copy "$vcpkgDir\installed\x64-windows-static\lib\tiff.lib" "$vcpkgDir\installed\x64-windows-static\lib\libtiff.lib"
          copy $VCPKG_DIR\installed\x64-windows\lib\wxmsw32u_core.lib $VCPKG_DIR\installed\x64-windows\lib\wxmsw30_core.lib
          copy $VCPKG_DIR\installed\x64-windows\lib\wxbase32u.lib $VCPKG_DIR\installed\x64-windows\lib\wxbase30.lib
          copy $VCPKG_DIR\installed\x64-windows\lib\tiff.lib $VCPKG_DIR\installed\x64-windows\lib\wxtiff.lib
          copy $VCPKG_DIR\installed\x64-windows\lib\turbojpeg.lib $VCPKG_DIR\installed\x64-windows\lib\wxjpeg.lib
          copy $VCPKG_DIR\installed\x64-windows\lib\libpng16.lib $VCPKG_DIR\installed\x64-windows\lib\wxpng.lib
          copy $VCPKG_DIR\installed\x64-windows\lib\zlib.lib $VCPKG_DIR\installed\x64-windows\lib\wxzlib.lib
          copy $VCPKG_DIR\installed\x64-windows\lib\pcre2-32.lib $VCPKG_DIR\installed\x64-windows\lib\wxregex.lib
          copy $VCPKG_DIR\installed\x64-windows\lib\libexpat.lib $VCPKG_DIR\installed\x64-windows\lib\wxexpat.lib

      - name: 🔹 [BUILD] Compile Projects
        shell: pwsh
        run: |
          $patchDir = "C:\test\DemoIccMAX"
          Write-Host "🔹 Building individual projects..."
          $projects = @(
            "IccXML\IccLibXML\IccLibXML_CRTDLL_v22.vcxproj",
            "IccXML\IccLibXML\IccLibXML_v22.vcxproj",
            "IccProfLib\IccProfLib_CRTDLL_v22.vcxproj",
            "IccProfLib\IccProfLib_DLL_v22.vcxproj",
            "IccProfLib\IccProfLib_v22.vcxproj",
            "IccXML\CmdLine\IccFromXml\IccFromXml_v22.vcxproj",
            "IccXML\CmdLine\IccToXml\IccToXml_v22.vcxproj",
            "Tools\CmdLine\IccApplyNamedCmm\iccApplyNamedCmm_v22.vcxproj",
            "Tools\CmdLine\IccApplyToLink\iccApplyToLink_v16.vcxproj",
            "Tools\CmdLine\IccDumpProfile\iccDumpProfile_v22.vcxproj",
            "Tools\CmdLine\IccFromCube\iccFromCube_v16.vcxproj",
            "Tools\CmdLine\IccRoundTrip\iccRoundTrip_v22.vcxproj",
            "Tools\CmdLine\IccV5DspObsToV4Dsp\IccV5DspObsToV4Dsp_v22.vcxproj",
            "Tools\Winnt\DemoIccMAXCmm\DemoIccMAXCmm_v22.vcxproj",
            "Tools\CmdLine\IccApplyProfiles\iccApplyProfiles_v22.vcxproj",
            "Tools\CmdLine\IccTiffDump\iccTiffDump_v22.vcxproj",
            "Tools\CmdLine\IccSpecSepToTiff\iccSpecSepToTiff_v22.vcxproj"
          )
          foreach ($project in $projects) {
            Write-Host "🛠️ Building: $project"
            msbuild "$patchDir\$project" /m /maxcpucount /p:Configuration=Asan /p:Platform=x64 /p:AdditionalIncludeDirectories="$vcpkgDir\installed\x64-windows\include" /p:AdditionalLibraryDirectories="$vcpkgDir\installed\x64-windows\lib" /p:CLToolAdditionalOptions="/fsanitize=address /O2 /W4" /p:LinkToolAdditionalOptions="/fsanitize=address /INCREMENTAL:NO" msbuild /m /maxcpucount .\Build\MSVC\BuildAll_v22.sln /p:Configuration=Asan /p:Platform=x64 /p:AdditionalIncludeDirectories="$vcpkgDir\installed\x64-windows\include" /p:AdditionalLibraryDirectories="$vcpkgDir\installed\x64-windows\lib" /p:CLToolAdditionalOptions="/fsanitize=address /O2 /W4" /p:LinkToolAdditionalOptions="/fsanitize=address /INCREMENTAL:NO"  /verbosity:diagnostic /bl  /noconlog /flp:v=diag /p:LinkToolAdditionalOptions="/DYNAMICBASE /HIGHENTROPYVA /NXCOMPAT /GUARD:CF /GUARD:EH /SAFESEH /FIXED:NO" /t:Clean,Build
          }

      - name: 🔹 [EXPORT] Copy DLLs & Libraries for Testing
        shell: pwsh
        run: |
          Write-Host "🔹 Copying DLLs and libraries for testing..."
          $patchDir = "C:\test\DemoIccMAX"
          cd "$patchDir\Testing"
          copy "C:\test\vcpkg\installed\x64-windows\lib\*.dll" .
          copy "C:\test\vcpkg\installed\x64-windows-static\lib\*.lib" .

      - name: 📤 [UPLOAD] Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Artifacts
          path: C:\test\DemoIccMAX

      - name: 📤 [UPLOAD] Build Logs
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: ${{ github.workspace }}/logs
