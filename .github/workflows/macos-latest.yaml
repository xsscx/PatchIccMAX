name: "XNU Latest"

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build Master Branch
    runs-on: macos-latest
    strategy:
      fail-fast: false

    steps:
    # Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up Git anonymous identity
    - name: Set up Git anonymous identity
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"

    # Clone DemoIccMAX & Install Dependencies
    - name: Clone DemoIccMAX & Install Dependencies
      run: |
        git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git
        cd DemoIccMAX
        brew install nlohmann-json libxml2 wxwidgets libtiff llvm lld

        # Ensure LLVM is correctly linked
        brew link --force llvm || true

        # Set correct paths for LLVM
        echo 'export PATH="/opt/homebrew/opt/llvm/bin:$PATH"' >> ~/.bash_profile
        echo 'export LDFLAGS="-L/opt/homebrew/opt/llvm/lib"' >> ~/.bash_profile
        echo 'export CPPFLAGS="-I/opt/homebrew/opt/llvm/include"' >> ~/.bash_profile
        source ~/.bash_profile

        # Verify scan-build installation
        /opt/homebrew/opt/llvm/bin/scan-build --version || { echo "❌ scan-build not found after installation"; exit 1; }

    # Configure the build with CMake (with scan-build)
    - name: Configure Build with CMake & scan-build
      run: |
        export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
        mkdir -p DemoIccMAX/Build
        cd DemoIccMAX/Build
        /opt/homebrew/opt/llvm/bin/scan-build cmake -DCMAKE_INSTALL_PREFIX=$HOME/.local \
                         -DCMAKE_BUILD_TYPE=Debug \
                         -DCMAKE_CXX_FLAGS="-g -fsanitize=address,undefined -fno-omit-frame-pointer -Wall" \
                         -Wno-dev Cmake/

    # Run Static Analysis using scan-build
    - name: Run Static Analysis with scan-build
      run: |
        export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
        cd DemoIccMAX/Build
        /opt/homebrew/opt/llvm/bin/scan-build -o scan-results make -j$(sysctl -n hw.ncpu)

    # Upload scan-build results as an artifact
    - name: Upload scan-build Report
      uses: actions/upload-artifact@v4
      with:
        name: scan-build-report
        path: DemoIccMAX/Build/scan-results

    # Build the project using CMake (without scan-build)
    - name: Build project with CMake
      run: |
        cd DemoIccMAX/Build
        make -j$(sysctl -n hw.ncpu)

    # Upload built binaries as artifacts
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: main_ci_macos build
        path: DemoIccMAX/Build

    # Check build success
    - name: Check Build Success
      run: |
        if [ $? -eq 0 ]; then
          echo "✅ Build Succeeded"
        else
          echo "❌ Build Failed"
          exit 1
        fi

