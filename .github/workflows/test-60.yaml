name: Windows60

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BuildConfiguration: Debug
      BUILD_DIR: ${{ github.workspace }}/builds  # Ensure 'builds' directory exists

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup directories and initialize vcpkg
      run: |
        $buildDir = Join-Path $env:RUNNER_TEMP "build"
        $vcpkgDir = Join-Path $buildDir "vcpkg"
        $outputDir = Join-Path $env:RUNNER_TEMP "output"

        # Create necessary directories
        New-Item -ItemType Directory -Path $buildDir -Force
        New-Item -ItemType Directory -Path $outputDir -Force

        # Clone vcpkg if not already present
        if (-Not (Test-Path "$vcpkgDir\.git")) {
            Write-Host "Cloning vcpkg..."
            git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
            & "$vcpkgDir\bootstrap-vcpkg.bat"
        }

        # Install required libraries
        Write-Host "Installing libraries via vcpkg..."
        & "$vcpkgDir\vcpkg.exe" install `
          egl-registry:x64-windows-static `
          vcpkg-cmake:x64-windows-static `
          vcpkg-cmake-config:x64-windows-static `
          nlohmann-json:x64-windows `
          nlohmann-json:x64-windows-static `
          libxml2:x64-windows `
          tiff:x64-windows `
          wxwidgets:x64-windows `
          libxml2:x64-windows-static `
          tiff:x64-windows-static `
          wxwidgets:x64-windows-static `
          --debug
        Write-Host "vcpkg libraries installed successfully."

    - name: Clone PatchIccMAX repository
      run: |
        $repoDir = Join-Path $env:RUNNER_TEMP "PatchIccMAX"
        if (-Not (Test-Path "$repoDir\.git")) {
            Write-Host "Cloning PatchIccMAX repository..."
            git clone https://github.com/xsscx/PatchIccMAX.git $repoDir
        } else {
            Write-Host "PatchIccMAX repository already exists. Pulling latest changes..."
            cd $repoDir
            git pull
        }
        cd $repoDir
        git checkout master

        # Verify directory structure
        if (-Not (Test-Path "$repoDir\Build\MSVC")) {
            Write-Error "Expected directory structure missing: $repoDir\Build\MSVC"
            exit 1
        }

    - name: Locate MSBuild using vswhere
      id: msbuild-locate
      run: |
        $msbuildPath = & "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"
        if (-Not $msbuildPath) {
            Write-Error "MSBuild.exe not found."
            exit 1
        } else {
            Write-Host "MSBuild found at: $msbuildPath"
            echo "::set-output name=msbuild-path::$msbuildPath"
        }

    - name: Build the project using MSBuild
      run: |
        $repoDir = Join-Path $env:RUNNER_TEMP "PatchIccMAX"
        $solutionPath = Join-Path $repoDir "Build\MSVC\BuildAll_v22.sln"
        if (-Not (Test-Path $solutionPath)) {
            Write-Error "Solution file does not exist: $solutionPath"
            exit 1
        }

        $msbuildPath = "${{ steps.msbuild-locate.outputs['msbuild-path'] }}"
        & $msbuildPath $solutionPath `
            /m `
            /p:Configuration=${{ env.BuildConfiguration }} `
            /p:Platform=x64 `
            /p:AdditionalIncludeDirectories="$env:RUNNER_TEMP\vcpkg\installed\x64-windows\include" `
            /p:AdditionalLibraryDirectories="$env:RUNNER_TEMP\vcpkg\installed\x64-windows\lib" `
            /p:CLToolAdditionalOptions="/fsanitize=address /Zi /Od /DDEBUG /W4" `
            /p:LinkToolAdditionalOptions="/fsanitize=address /DEBUG /INCREMENTAL:NO"

    - name: Copy build artifacts to output directory
      run: |
        $repoDir = Join-Path $env:RUNNER_TEMP "PatchIccMAX"
        $outputDir = Join-Path $env:RUNNER_TEMP "output"
        $files = Get-ChildItem -Path $repoDir -Recurse -Include *.exe, *.dll, *.lib
        foreach ($file in $files) {
            Copy-Item -Path $file.FullName -Destination $outputDir -Force
        }

    - name: List files in the output directory
      run: |
        Get-ChildItem -Path "$env:RUNNER_TEMP/output"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: PatchIccMAX-Build-Artifacts
        path: $env:RUNNER_TEMP/output

    - name: Upload build logs
      uses: actions/upload-artifact@v3
      with:
        name: PatchIccMAX-Build-Logs
        path: ${{ github.workspace }}/logs
