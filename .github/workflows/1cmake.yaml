name: 1cmake

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
             git clone https://github.com/xsscx/PatchIccMAX.git
             cd PatchIccMAX
             git checkout pr129
             vcpkg integrate install
             vcpkg install

      - name: Configure
        run: |
          cd PatchIccMAX\Build\Cmake\
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
      - name: Build
        run: |
          cmake --preset vs2022-x64 -B z -S Build/Cmake
          cmake --build z -- /m /maxcpucount
          dir /s /b *.exe *.lib

      - name: Verify Build Output
        shell: pwsh
        run: |
          $cmakeCache = "C:\test\PatchIccMAX\Build\Cmake\build\CMakeCache.txt"
          if (Test-Path $cmakeCache) {
            Write-Host "✅ Build succeeded. CMake cache found."
          } else {
            Write-Host "❌ Build failed! No CMakeCache.txt found."
            exit 1
          }

      - name: Upload Windows ARM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iccmax-windows-arm
          path: C:\test\PatchIccMAX

      - name: Upload Windows Logs
        uses: actions/upload-artifact@v4
        with:
          name: iccmax-windows-arm-log
          path: C:\test\PatchIccMAX\Build\Cmake\build\CMakeCache.txt

      - name: 🖥️ Host System Info
        shell: pwsh
        run: |
          systeminfo
          Get-CimInstance -ClassName Win32_Processor

      - name: Summary Report
        if: always()
        run: |
          echo "### Windows Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build Directory: PatchIccMAX/Build/" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts Uploaded: iccmax-windows-arm" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY
