pool:
  name: Default
  demands:
  - msbuild
  - visualstudio

steps:
# Step 1: Clean up any previous builds (optional but recommended)
- task: PowerShell@2
  displayName: 'Clean build directories'
  inputs:
    targetType: 'inline'
    script: |
      Remove-Item -Recurse -Force -ErrorAction Continue $(Build.BinariesDirectory)\* 
      Remove-Item -Recurse -Force -ErrorAction Continue $(Build.ArtifactStagingDirectory)\*

# Step 2: Build Solution
- task: VSBuild@1
  displayName: 'Build solution Build/MSVC/BuildAll_v22.sln - Debug'
  inputs:
    solution: 'Build/MSVC/BuildAll_v22.sln'
    platform: 'x64'
    configuration: 'Debug'
    maximumCpuCount: true
    msbuildArchitecture: 'x64'
    createLogFile: true
    logFileVerbosity: 'normal'  # Can set to 'detailed' for more info
    msbuildArgs: '/verbosity:minimal /fileLogger /fileLoggerParameters:LogFile=$(Build.ArtifactStagingDirectory)\msbuild.log /t:Clean,Build'
    
# Step 3: Build Solution - Release
- task: VSBuild@1
  displayName: 'Build solution Build/MSVC/BuildAll_v22.sln - Release'
  inputs:
    solution: 'Build/MSVC/BuildAll_v22.sln'
    platform: 'x64'
    configuration: 'Release'
    maximumCpuCount: true
    msbuildArchitecture: 'x64'
    createLogFile: true
    logFileVerbosity: 'normal'
    msbuildArgs: '/verbosity:minimal /fileLogger /fileLoggerParameters:LogFile=$(Build.ArtifactStagingDirectory)\msbuild_release.log /t:Clean,Build'

# Step 5: Publish MSBuild Logs (optional, but good for debugging)
- task: PublishBuildArtifacts@1
  displayName: 'Publish MSBuild Logs'
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'BuildLogs'
    publishLocation: 'Container'
